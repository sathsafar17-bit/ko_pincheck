<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Pincode Checker | Simple Serviceability Tool</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* FULL WHITE / LIGHT TOOL STYLE — clean, simple, no gradients, no heavy shadows */
        body {
            font-family: system-ui, 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
            background: #ffffff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px 16px;
        }

        .container {
            background: white;
            max-width: 580px;
            width: 100%;
            margin: 0 auto;
            border: 1px solid #e9eef2;
            border-radius: 24px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.02), 0 1px 2px rgba(0, 0, 0, 0.03);
        }

        /* plain white header — minimal */
        .header {
            background: #ffffff;
            padding: 28px 24px 16px 24px;
            text-align: center;
            border-bottom: 1px solid #f0f2f4;
        }

        .header h1 {
            font-size: 26px;
            font-weight: 600;
            letter-spacing: -0.3px;
            color: #1a2c3e;
            margin-bottom: 8px;
        }

        .header p {
            font-size: 15px;
            color: #5b6e8c;
            font-weight: 400;
        }

        .content {
            padding: 28px 24px 32px 24px;
        }

        .input-group {
            margin-bottom: 28px;
        }

        label {
            display: block;
            font-weight: 500;
            color: #1f2a3e;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .input-wrapper {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }

        input {
            flex: 1;
            padding: 14px 16px;
            border: 1px solid #cfdde6;
            border-radius: 20px;
            font-size: 18px;
            font-family: 'SF Mono', 'Menlo', monospace;
            font-weight: 500;
            background: #ffffff;
            transition: all 0.2s ease;
            color: #0b2b3d;
        }

        input:focus {
            outline: none;
            border-color: #9aaebf;
            box-shadow: 0 0 0 3px rgba(0, 0, 0, 0.02);
        }

        button {
            background: #ffffff;
            color: #1f3a4b;
            border: 1px solid #cbdae3;
            padding: 0 26px;
            border-radius: 40px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.15s linear;
            height: 52px;
            letter-spacing: 0.2px;
        }

        button:hover {
            background: #f8fafc;
            border-color: #a0b3c2;
        }

        button:active {
            background: #eef2f6;
            transform: scale(0.97);
        }

        /* result blocks — flat and clear */
        .result {
            margin-top: 20px;
            padding: 20px;
            border-radius: 24px;
            display: none;
            animation: fadeSlide 0.2s ease-out;
            background: white;
            border: 1px solid #eef2f6;
        }

        .result.serviceable {
            background: #ffffff;
            border-left: 5px solid #2c7a4d;
            border-top: 1px solid #e0ece5;
            border-right: 1px solid #e0ece5;
            border-bottom: 1px solid #e0ece5;
        }

        .result.not-serviceable {
            background: #ffffff;
            border-left: 5px solid #b91c2c;
            border-top: 1px solid #ffe6e8;
            border-right: 1px solid #ffe6e8;
            border-bottom: 1px solid #ffe6e8;
        }

        .result.error {
            background: #ffffff;
            border-left: 5px solid #e67e22;
            border-top: 1px solid #ffeed9;
            border-right: 1px solid #ffeed9;
            border-bottom: 1px solid #ffeed9;
        }

        @keyframes fadeSlide {
            from {
                opacity: 0;
                transform: translateY(-5px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .result h3 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .result p {
            margin: 6px 0;
            font-size: 15px;
            line-height: 1.4;
            color: #2c3e4e;
        }

        .result .sub {
            font-size: 13px;
            color: #6a7c8f;
        }

        .stats {
            margin-top: 28px;
            padding-top: 20px;
            border-top: 1px solid #edf2f6;
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: #62748c;
            font-weight: 450;
        }

        .examples {
            margin-top: 24px;
        }

        .examples p {
            font-size: 13px;
            font-weight: 500;
            color: #3b4e64;
            margin-bottom: 10px;
        }

        .example-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .example-btn {
            background: #f9fbfd;
            border: 1px solid #dce4ec;
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 13px;
            font-family: monospace;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.1s;
            color: #1f3a4b;
        }

        .example-btn:hover {
            background: #edf3f8;
            border-color: #bfcfdd;
        }

        @media (max-width: 520px) {
            .content {
                padding: 20px 18px;
            }
            .input-wrapper {
                flex-direction: column;
                gap: 12px;
            }
            button {
                width: 100%;
                padding: 12px;
            }
            .header h1 {
                font-size: 22px;
            }
            .stats {
                flex-direction: column;
                align-items: flex-start;
                gap: 6px;
            }
        }

        /* no loading spinners, no extravagant gradients, fully sober */
        .tool-note {
            font-size: 12px;
            color: #8c9ab0;
            text-align: center;
            margin-top: 16px;
        }

        strong {
            font-weight: 600;
            color: #1f3a4b;
        }
    </style>
</head>

    const checkBtn = document.getElementById('checkBtn');
    const resultDiv = document.getElementById('result');

    // helpers
    function showServiceable(pin) {
        resultDiv.className = 'result serviceable';
        resultDiv.style.display = 'block';
        resultDiv.innerHTML = `
            <h3>✅ Serviceable</h3>
            <p><strong>Pincode:</strong> ${pin}</p>
            <p>your are eligible for fkyc.</p>
        `;
    }

    function showNotServiceable(pin) {
        resultDiv.className = 'result not-serviceable';
        resultDiv.style.display = 'block';
        resultDiv.innerHTML = `
            <h3>❌ Not serviceable</h3>
            <p><strong>Pincode:</strong> ${pin}</p>
            <p>your are not eligible for fkyc.</p>
        `;
    }

    function showError(msg) {
        resultDiv.className = 'result error';
        resultDiv.style.display = 'block';
        resultDiv.innerHTML = `
            <h3>⚠️ Invalid</h3>
            <p>${msg}</p>
            <p class="sub">Enter a valid 6-digit pincode.</p>
        `;
    }

    function checkPincode() {
        const rawPin = pincodeInput.value.trim();
        resultDiv.style.display = 'none';

        if (!rawPin) {
            showError('Please enter a pincode');
            return;
        }
        if (!/^\d{6}$/.test(rawPin)) {
            showError('Pincode must be exactly 6 digits');
            return;
        }

        if (serviceablePincodes.has(rawPin)) {
            showServiceable(rawPin);
        } else {
            showNotServiceable(rawPin);
        }
    }

    // events
    checkBtn.addEventListener('click', checkPincode);
    pincodeInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') checkPincode();
    });

    // sample buttons (clean)
    const samplePins = [''];
    const exampleContainer = document.getElementById('exampleButtons');
    samplePins.forEach(pin => {
        const btn = document.createElement('button');
        btn.className = 'example-btn';
        btn.textContent = pin;
        btn.onclick = () => {
            pincodeInput.value = pin;
            checkPincode();
        };
        exampleContainer.appendChild(btn);
    });

    pincodeInput.focus();
